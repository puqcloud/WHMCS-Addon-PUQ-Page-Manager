<svg xmlns="http://www.w3.org/2000/svg" width="440" height="250" viewBox="0 0 440 250">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6c3ce0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="440" height="250" fill="url(#bg)" rx="8"/>

  <!-- Accent line top -->
  <rect x="0" y="0" width="440" height="4" fill="url(#accent)" rx="2"/>

  <!-- Page/blocks icon -->
  <g transform="translate(30, 35)">
    <!-- Page outline -->
    <rect x="10" y="5" width="70" height="90" rx="4" fill="none" stroke="#8b5cf6" stroke-width="2.5"/>
    <!-- Block 1 (header) -->
    <rect x="18" y="14" width="54" height="12" rx="2" fill="#6c3ce0" opacity="0.6"/>
    <!-- Block 2 (text) -->
    <rect x="18" y="32" width="54" height="8" rx="1" fill="#4a5568" opacity="0.6"/>
    <rect x="18" y="44" width="40" height="8" rx="1" fill="#4a5568" opacity="0.4"/>
    <!-- Block 3 (widget) -->
    <rect x="18" y="58" width="24" height="24" rx="3" fill="#8b5cf6" opacity="0.3" stroke="#8b5cf6" stroke-width="1"/>
    <rect x="48" y="58" width="24" height="24" rx="3" fill="#8b5cf6" opacity="0.3" stroke="#8b5cf6" stroke-width="1"/>
    <!-- Plus icon in widget block -->
    <line x1="30" y1="66" x2="30" y2="76" stroke="#8b5cf6" stroke-width="2"/>
    <line x1="25" y1="71" x2="35" y2="71" stroke="#8b5cf6" stroke-width="2"/>
  </g>

  <!-- Widget grid icon -->
  <g transform="translate(110, 80)">
    <rect x="0" y="0" width="18" height="18" rx="3" fill="#6c3ce0" opacity="0.5"/>
    <rect x="22" y="0" width="18" height="18" rx="3" fill="#8b5cf6" opacity="0.4"/>
    <rect x="0" y="22" width="18" height="18" rx="3" fill="#a78bfa" opacity="0.3"/>
    <rect x="22" y="22" width="18" height="18" rx="3" fill="#6c3ce0" opacity="0.4"/>
  </g>

  <!-- Module title -->
  <text x="220" y="60" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="white" text-anchor="start">Page</text>
  <text x="220" y="92" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="white" text-anchor="start">Manager</text>

  <!-- Subtitle -->
  <text x="220" y="119" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="start">WHMCS Addon Module</text>

  <!-- Divider -->
  <rect x="220" y="132" width="60" height="2" fill="#6c3ce0" rx="1"/>

  <!-- Description -->
  <text x="220" y="156" font-family="Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="start">Block widget editor with 23+</text>
  <text x="220" y="172" font-family="Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="start">widgets, SEO &amp; multilingual pages</text>

  <!-- PUQ Cloud branding -->
  <g transform="translate(30, 210)">
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#6c3ce0">PUQ</text>
    <text x="55" y="15" font-family="Arial, sans-serif" font-size="12" fill="#64748b">cloud</text>
  </g>

  <!-- Version badge -->
  <g transform="translate(362, 218)">
    <rect x="0" y="0" width="55" height="20" rx="4" fill="#6c3ce0" opacity="0.2" stroke="#6c3ce0" stroke-width="1"/>
    <text x="27" y="14" font-family="Arial, sans-serif" font-size="11" fill="#a78bfa" text-anchor="middle">v1.0</text>
  </g>
</svg>
